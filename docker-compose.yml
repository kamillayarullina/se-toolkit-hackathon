services:
  queueless:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: queueless-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/bookings.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/tas"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db-data:
    driver: local
